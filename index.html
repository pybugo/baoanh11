// ========== SHUFFLE QUESTION OPTIONS ==========
function shuffleQuestion(q) {
  const correctAnswer = q.opts[q.correct];
  const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
  const newCorrectIdx = shuffled.indexOf(correctAnswer);
  return { ...q, opts: shuffled, correct: newCorrectIdx };
}

const XP_PER_CORRECT = 20;
const XP_PER_STREAK_BONUS = 5;
const LEVELS = [0,100,250,500,800,1200,1800,2500,3500,5000];
const RANKS = ['🌱 Mầm non','🌿 Nhà sinh học nhỏ','🍀 Thám hiểm viên','🌳 Nhà nghiên cứu','🔬 Tiến sĩ sinh học','🧬 Giáo sư','🏆 Viện sĩ','👑 Bậc thầy','⭐ Huyền thoại','💎 Thiên tài'];

// ========== STATE ==========
let playerData = null;
let allRecords = [];
let currentView = 'home'; // home, chapters, quiz, results, profile
let currentChapter = null;
let quizState = null;
let toastTimeout = null;

// ========== DEFAULT CONFIG ==========
const defaultConfig = {
  game_title: 'Sinh Học 9 Adventure',
  welcome_text: 'Chào mừng nhà khoa học trẻ!',
  background_color: '#0f172a',
  surface_color: '#1e293b',
  text_color: '#f1f5f9',
  primary_color: '#22c55e',
  accent_color: '#3b82f6'
};

let config = { ...defaultConfig };

// ========== HELPERS ==========
function getLevel(xp) {
  for (let i = LEVELS.length - 1; i >= 0; i--) { if (xp >= LEVELS[i]) return i; }
  return 0;
}
function getXpProgress(xp) {
  const lvl = getLevel(xp);
  if (lvl >= LEVELS.length - 1) return 100;
  const curr = xp - LEVELS[lvl];
  const needed = LEVELS[lvl + 1] - LEVELS[lvl];
  return Math.round((curr / needed) * 100);
}
function getCompletedChapters() {
  if (!playerData) return [];
  try { return JSON.parse(playerData.chapters_completed || '[]'); } catch { return []; }
}

function showToast(msg, type = 'success') {
  let t = document.getElementById('toast-container');
  if (!t) { t = document.createElement('div'); t.id = 'toast-container'; t.className = 'fixed top-4 right-4 z-50'; document.body.appendChild(t); }
  const el = document.createElement('div');
  const bg = type === 'success' ? config.primary_color : type === 'error' ? '#ef4444' : config.accent_color;
  el.className = 'toast rounded-xl px-5 py-3 mb-2 text-white font-bold shadow-2xl';
  el.style.background = bg;
  el.textContent = msg;
  t.appendChild(el);
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.remove(), 2500);
}

// ========== RENDER ENGINE ==========
function render() {
  const app = document.getElementById('app');
  app.style.background = config.background_color;
  app.style.color = config.text_color;
  app.className = 'w-full h-full overflow-auto';

  switch (currentView) {
    case 'home': renderHome(app); break;
    case 'chapters': renderChapters(app); break;
    case 'quiz': renderQuiz(app); break;
    case 'results': renderResults(app); break;
    case 'profile': renderProfile(app); break;
  }
  lucide.createIcons();
}

// ========== HOME SCREEN ==========

async function startGame() {
  const input = document.getElementById('player-name');
  const name = (input?.value || '').trim();
  if (!name) { input?.classList.add('shake'); setTimeout(() => input?.classList.remove('shake'), 500); showToast('Hãy nhập tên bạn nhé!', 'error'); return; }
  if (allRecords.length >= 999) { showToast('Đã đạt giới hạn lưu trữ!', 'error'); return; }

  const btn = input.closest('.slide-up').querySelector('button');
  btn.disabled = true; btn.textContent = 'Đang tạo...';

  const result = await window.dataSdk.create({
    player_name: name, total_xp: 0, level: 0, streak: 0,
    last_played: new Date().toISOString(), chapters_completed: '[]', high_score: 0
  });

  if (result.isOk) {
    showToast(`Chào mừng ${name}! 🎉`);
  } else {
    btn.disabled = false; btn.textContent = '🚀 Bắt đầu phiêu lưu!';
    showToast('Có lỗi xảy ra, thử lại nhé!', 'error');
  }
}

// ========== CHAPTERS ==========

        <div class="text-center">
          <h2 class="text-xl font-black" style="font-family:'Fredoka One',cursive;color:${config.primary_color}">Chương trình học</h2>
          <p class="text-xs opacity-50">${completed.length}/${CHAPTERS.length} hoàn thành</p>
        </div>
        <button onclick="currentView='profile';render()" class="p-2 rounded-xl transition hover:opacity-70"><i data-lucide="trophy" class="w-6 h-6" style="color:${config.primary_color}"></i></button>
      </header>

      <!-- XP Bar -->
      <div class="rounded-2xl p-4 mb-6 flex items-center gap-4" style="background:${config.surface_color}">
        <div class="text-3xl">${RANKS[getLevel(playerData?.total_xp || 0)].split(' ')[0]}</div>
        <div class="flex-1">
          <div class="flex justify-between text-sm mb-1">

          </div>
          <div class="rounded-full h-3 overflow-hidden" style="background:${config.background_color}">
            <div class="h-full rounded-full progress-fill" style="width:${getXpProgress(playerData?.total_xp || 0)}%;background:linear-gradient(90deg,${config.primary_color},${config.accent_color})"></div>
          </div>
        </div>
      </div>

      <div class="grid gap-4">
        ${CHAPTERS.map((ch, i) => {
          const done = completed.includes(ch.id);

          return `
          <div class="chapter-card rounded-2xl p-5 cursor-pointer relative overflow-hidden ${locked ? 'opacity-50' : ''}"

              <div class="text-4xl ${done ? '' : 'float-anim'}" style="animation-delay:${i*0.2}s">${locked ? '🔒' : ch.icon}</div>

          </div>`;

}

function startQuiz(chId) {
  currentChapter = CHAPTERS.find(c => c.id === chId);
  if (!currentChapter) return;
  // Shuffle questions and their options
  const shuffled = [...currentChapter.questions]
    .sort(() => Math.random() - 0.5)
    .map(q => shuffleQuestion(q));
  quizState = { questions: shuffled, current: 0, score: 0, streak: 0, answers: [], xpEarned: 0, answered: false };
  currentView = 'quiz';
  render();
}

// ========== QUIZ ==========
function renderQuiz(app) {
  if (!quizState || !currentChapter) return;
  const qs = quizState.questions;
  const qi = quizState.current;
  const q = qs[qi];
  const progress = ((qi) / qs.length) * 100;

  app.innerHTML = `
    <div class="min-h-full p-4 md:p-8 flex flex-col">
      <!-- Header -->
      <div class="flex items-center justify-between mb-4">
        <button onclick="if(!quizState.answered){currentView='chapters';render()}" class="p-2 rounded-xl hover:opacity-70"><i data-lucide="x" class="w-5 h-5"></i></button>
        <div class="flex items-center gap-2">
          <span class="text-2xl">${currentChapter.icon}</span>
          <span class="font-bold text-sm">${qi + 1}/${qs.length}</span>
        </div>
        <div class="flex items-center gap-1">
          <span class="text-lg">🔥</span>
          <span class="font-black" style="color:${config.primary_color}">${quizState.streak}</span>
        </div>
      </div>

      <!-- Progress -->
      <div class="rounded-full h-2 mb-6 overflow-hidden" style="background:${config.surface_color}">
        <div class="h-full rounded-full progress-fill" style="width:${progress}%;background:linear-gradient(90deg,${currentChapter.color},${config.primary_color})"></div>
      </div>

      <!-- Question -->
      <div class="flex-1 flex flex-col justify-center max-w-2xl mx-auto w-full">
        <div class="slide-up rounded-2xl p-6 mb-6" style="background:${config.surface_color}">
          <p class="text-xs font-bold opacity-40 mb-2">CÂU HỎI ${qi + 1}</p>
          <h2 class="text-xl md:text-2xl font-black leading-snug">${q.q}</h2>
        </div>

        <div class="space-y-3 slide-up" style="animation-delay:0.15s" id="options-container">
          ${q.opts.map((opt, oi) => {
            let cls = '';
            if (quizState.answered) {
              if (oi === q.correct) cls = 'correct';
              else if (quizState.answers[qi] === oi && oi !== q.correct) cls = 'wrong';
            }
            return `
            <button onclick="selectAnswer(${oi})" class="option-btn w-full text-left px-5 py-4 rounded-xl font-bold flex items-center gap-3 ${cls}" 
                    style="background:${config.surface_color};border:2px solid ${quizState.answered && oi === q.correct ? config.primary_color : 'transparent'}"
                    ${quizState.answered ? 'disabled' : ''}>
              <span class="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-black flex-shrink-0" style="background:${config.background_color}">${'ABCD'[oi]}</span>
              <span>${opt}</span>
            </button>`;
          }).join('')}
        </div>

        <!-- Explanation -->
        ${quizState.answered ? `
        <div class="mt-4 rounded-xl p-4 slide-up" style="background:${quizState.answers[qi] === q.correct ? config.primary_color : '#ef4444'}22;border:1px solid ${quizState.answers[qi] === q.correct ? config.primary_color : '#ef4444'}44">
          <p class="font-bold text-sm mb-1">${quizState.answers[qi] === q.correct ? '✅ Chính xác!' : '❌ Chưa đúng rồi!'}</p>
          <p class="text-sm opacity-80">${q.explain}</p>
        </div>
        <button onclick="nextQuestion()" class="mt-4 w-full py-4 rounded-2xl font-black text-lg text-white transition hover:scale-105" style="background:${config.primary_color}">
          ${qi < qs.length - 1 ? 'Câu tiếp theo →' : '🎉 Xem kết quả'}
        </button>
        ` : ''}
      </div>
    </div>
  `;
}

function selectAnswer(idx) {
  if (quizState.answered) return;
  const q = quizState.questions[quizState.current];
  quizState.answered = true;
  quizState.answers[quizState.current] = idx;

  if (idx === q.correct) {
    quizState.score++;
    quizState.streak++;
    const bonus = Math.floor(quizState.streak / 3) * XP_PER_STREAK_BONUS;
    quizState.xpEarned += XP_PER_CORRECT + bonus;
  } else {
    quizState.streak = 0;
  }
  render();
}

function nextQuestion() {
  if (quizState.current < quizState.questions.length - 1) {
    quizState.current++;
    quizState.answered = false;
    render();
  } else {
    currentView = 'results';
    saveProgress();
    render();
  }
}

async function saveProgress() {
  if (!playerData) return;
  const completed = getCompletedChapters();
  const passed = quizState.score >= Math.ceil(quizState.questions.length * 0.6);
  if (passed && !completed.includes(currentChapter.id)) completed.push(currentChapter.id);

  const newXp = (playerData.total_xp || 0) + quizState.xpEarned;
  const newHighScore = Math.max(playerData.high_score || 0, quizState.score);

  const updated = { ...playerData, total_xp: newXp, level: getLevel(newXp), streak: quizState.streak,
    last_played: new Date().toISOString(), chapters_completed: JSON.stringify(completed), high_score: newHighScore };

  const result = await window.dataSdk.update(updated);
  if (!result.isOk) showToast('Lưu tiến trình thất bại', 'error');
}

// ========== RESULTS ==========
function renderResults(app) {
  if (!quizState || !currentChapter) return;
  const total = quizState.questions.length;
  const pct = Math.round((quizState.score / total) * 100);
  const passed = pct >= 60;
  const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : pct >= 60 ? 1 : 0;

  app.innerHTML = `
    <div class="min-h-full flex flex-col items-center justify-center p-6 text-center cell-bg">
      <div class="slide-up max-w-md w-full">
        <div class="text-6xl mb-4">${passed ? '🎉' : '💪'}</div>
        <h1 class="text-3xl font-black mb-2" style="font-family:'Fredoka One',cursive;color:${passed ? config.primary_color : '#ef4444'}">
          ${passed ? 'Xuất sắc!' : 'Cố gắng thêm nhé!'}
        </h1>
        <p class="opacity-60 mb-6">${currentChapter.title}</p>

        <!-- Score Card -->
        <div class="rounded-2xl p-6 mb-6" style="background:${config.surface_color}">
          <div class="text-5xl font-black mb-2" style="color:${config.primary_color}">${pct}%</div>
          <p class="opacity-60">${quizState.score}/${total} câu đúng</p>
          <div class="flex justify-center gap-1 mt-3 text-3xl">
            ${[1,2,3].map(s => `<span ${s <= stars ? '' : 'class="opacity-20"'}>⭐</span>`).join('')}
          </div>
        </div>

        <!-- XP Earned -->
        <div class="rounded-xl p-4 mb-6 flex items-center justify-center gap-3" style="background:${config.primary_color}15;border:1px solid ${config.primary_color}33">
          <span class="text-2xl">✨</span>
          <span class="font-black text-xl" style="color:${config.primary_color}">+${quizState.xpEarned} XP</span>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button onclick="startQuiz('${currentChapter.id}')" class="py-3 rounded-xl font-bold transition hover:scale-105 border-2" style="border-color:${config.accent_color};color:${config.accent_color}">
            🔄 Làm lại
          </button>
          <button onclick="currentView='chapters';render()" class="py-3 rounded-xl font-bold text-white transition hover:scale-105" style="background:${config.primary_color}">
            📚 Chương khác
          </button>
        </div>
      </div>
    </div>
  `;
}

// ========== PROFILE ==========

  if (!playerData) { currentView = 'home'; render(); return; }
  const xp = playerData.total_xp || 0;
  const lvl = getLevel(xp);
  const completed = getCompletedChapters();

  app.innerHTML = `
    <div class="min-h-full p-4 md:p-8">
      <header class="flex items-center justify-between mb-6">
        <button onclick="currentView='home';render()" class="p-2 rounded-xl hover:opacity-70"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
        <h2 class="text-xl font-black" style="font-family:'Fredoka One',cursive;color:${config.primary_color}">Hồ sơ</h2>
        <div class="w-10"></div>
      </header>

      <div class="max-w-lg mx-auto slide-up">
        <!-- Avatar Card -->
        <div class="rounded-2xl p-6 text-center mb-6" style="background:${config.surface_color}">
          <div class="text-6xl mb-3">${RANKS[lvl].split(' ')[0]}</div>
          <h3 class="text-2xl font-black">${playerData.player_name}</h3>
          <p class="opacity-60 text-sm">${RANKS[lvl]}</p>

          <div class="mt-4">
            <div class="flex justify-between text-sm mb-1">
              <span>Level ${lvl}</span>
              <span class="opacity-60">${lvl < LEVELS.length - 1 ? `${LEVELS[lvl+1] - xp} XP đến Level ${lvl+1}` : 'MAX'}</span>
            </div>
            <div class="rounded-full h-4 overflow-hidden" style="background:${config.background_color}">
              <div class="h-full rounded-full progress-fill" style="width:${getXpProgress(xp)}%;background:linear-gradient(90deg,${config.primary_color},${config.accent_color})"></div>
            </div>
          </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-3 mb-6">
          ${[
            { icon: '✨', label: 'Tổng XP', val: xp },
            { icon: '📚', label: 'Chương hoàn thành', val: `${completed.length}/${CHAPTERS.length}` },
            { icon: '🏆', label: 'Điểm cao nhất', val: playerData.high_score || 0 },
            { icon: '🔥', label: 'Streak', val: playerData.streak || 0 },
          ].map(s => `
            <div class="rounded-xl p-4 text-center" style="background:${config.surface_color}">
              <div class="text-2xl mb-1">${s.icon}</div>
              <div class="font-black text-xl" style="color:${config.primary_color}">${s.val}</div>
              <div class="text-xs opacity-50">${s.label}</div>
            </div>
          `).join('')}
        </div>

        <!-- Achievements -->
        <div class="rounded-2xl p-5" style="background:${config.surface_color}">
          <h4 class="font-black mb-3">🏅 Cấp bậc</h4>
          <div class="space-y-2">
            ${RANKS.map((r, i) => `
              <div class="flex items-center gap-3 py-2 ${i <= lvl ? '' : 'opacity-30'}">
                <span class="text-xl">${r.split(' ')[0]}</span>
                <span class="text-sm font-bold flex-1">${r.split(' ').slice(1).join(' ')}</span>
                <span class="text-xs opacity-50">${LEVELS[i]} XP</span>
                ${i <= lvl ? '<span class="text-green-400 text-xs">✅</span>' : ''}
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

// ========== SDK INIT ==========
const dataHandler = {
  onDataChanged(data) {
    allRecords = data;
    // Use first record as player
    playerData = data.length > 0 ? data[0] : null;
    render();
  }
};

(async () => {
  await window.dataSdk.init(dataHandler);

  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (cfg) => {
      config = { ...defaultConfig, ...cfg };
      render();
    },
    mapToCapabilities: (cfg) => ({
      recolorables: [
        { get: () => cfg.background_color || defaultConfig.background_color, set: v => { cfg.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => cfg.surface_color || defaultConfig.surface_color, set: v => { cfg.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => cfg.text_color || defaultConfig.text_color, set: v => { cfg.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => cfg.primary_color || defaultConfig.primary_color, set: v => { cfg.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
        { get: () => cfg.accent_color || defaultConfig.accent_color, set: v => { cfg.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
      ],
      borderables: [],
      fontEditable: {
        get: () => cfg.font_family || defaultConfig.font_family || 'Nunito',
        set: v => { cfg.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
      },
      fontSizeable: {
        get: () => cfg.font_size || defaultConfig.font_size || 16,
        set: v => { cfg.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
      }
    }),
    mapToEditPanelValues: (cfg) => new Map([
      ['game_title', cfg.game_title || defaultConfig.game_title],
      ['welcome_text', cfg.welcome_text || defaultConfig.welcome_text]
    ])
  });

  render();
})();
